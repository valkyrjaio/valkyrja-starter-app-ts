name: Cherry-pick pull-requests to Branches

on:
  workflow_dispatch:
    inputs:
      destination:
        description: 'Destination branch to cherry-pick to'
        required: true
        type: string
      hash:
        description: 'Hash to cherry-pick'
        required: true

run-name: Cherry Pick ${{ inputs.hash }} To ${{ inputs.destination }}

jobs:
  cherry-pick:
    name: Cherry-pick
    uses: valkyrjaio/.github/.github/workflows/_cherry-pick-commits.yml@5471774760dfc2111d2fac7819b91e3bff45edb3
    permissions:
      contents: write
    with:
      destination: ${{ inputs.destination }}
      hash: ${{ inputs.hash }}
      valid-branch-pattern: '^2([6-9]).x$'
